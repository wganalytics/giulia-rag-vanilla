<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 680 820"
  width="2040" height="2460"
  role="img"
  style="font-family: 'Inter', 'Segoe UI', sans-serif; background: #0f1117;">

  <!-- DEFS para filtros e gradientes -->
  <defs>
    <!-- Gradientes -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <linearGradient id="ingest-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="store-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#374151" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
    <linearGradient id="retrieval-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    <linearGradient id="generation-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="interface-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#2e1065" />
    </linearGradient>

    <!-- Sombras -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Seta padrão -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <!-- Seta ativa -->
    <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
  </defs>

  <!-- Fundo global -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Título do Diagrama -->
  <g transform="translate(340, 40)" text-anchor="middle">
    <text y="0" font-size="18" font-weight="700" fill="#f8fafc">PRJ-01 · Sistema de QA Corporativo</text>
    <text y="20" font-size="12" font-weight="400" fill="#94a3b8">Vanilla RAG (Retrieval-Augmented Generation)</text>
  </g>

  <!-- ========================================== -->
  <!-- CAMADA 1: INGESTÃO -->
  <!-- ========================================== -->
  <g transform="translate(40, 90)">
    <text x="10" y="0" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">INGESTÃO</text>
    
    <!-- Node A: PDF Upload -->
    <g transform="translate(20, 20)">
      <rect width="140" height="50" rx="6" fill="url(#ingest-grad)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" />
      <text x="70" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">📄 PDF Corporativo</text>
      <text x="70" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">Base de Conhecimento</text>
    </g>

    <!-- Linha A -> B -->
    <path d="M 160 45 L 240 45" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="200" y="38" font-size="9" fill="#94a3b8" text-anchor="middle">fitz / PyMuPDF</text>

    <!-- Node B: Text Extraction -->
    <g transform="translate(240, 20)">
      <rect width="120" height="50" rx="6" fill="url(#ingest-grad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
      <text x="60" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">Extração de Texto</text>
      <text x="60" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">Metadata por Página</text>
    </g>

    <!-- Linha B -> C -->
    <path d="M 360 45 L 440 45" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Node C: Chunking -->
    <g transform="translate(440, 20)">
      <rect width="140" height="50" rx="6" fill="url(#ingest-grad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)" />
      <text x="70" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">RecursiveTextSplitter</text>
      <text x="70" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">Chunks Semânticos</text>
    </g>

    <!-- Linha C -> D -->
    <path d="M 510 70 L 510 110" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="520" y="95" font-size="9" fill="#94a3b8">OllamaEmbeddings</text>
  </g>

  <!-- ========================================== -->
  <!-- CAMADA 2: ARMAZENAMENTO -->
  <!-- ========================================== -->
  <g transform="translate(440, 210)">
    <!-- Node D: ChromaDB -->
    <rect width="180" height="60" rx="8" fill="url(#store-grad)" stroke="#ef4444" stroke-width="2" filter="url(#shadow)" />
    <text x="90" y="28" font-size="13" font-weight="700" fill="#f8fafc" text-anchor="middle">ChromaDB</text>
    <text x="90" y="46" font-size="10" fill="#fca5a5" text-anchor="middle">Vector Store (Local Persist)</text>
  </g>

  <!-- ========================================== -->
  <!-- CAMADA 3: INTERFACE E RECUPERAÇÃO -->
  <!-- ========================================== -->
  <g transform="translate(40, 270)">
    <text x="10" y="0" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">INTERAÇÃO E RECUPERAÇÃO</text>

    <!-- Node E: User / Streamlit -->
    <g transform="translate(20, 20)">
      <rect width="140" height="50" rx="6" fill="url(#interface-grad)" stroke="#a855f7" stroke-width="2" filter="url(#glow)" />
      <text x="70" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">🙋 Usuário</text>
      <text x="70" y="40" font-size="9" fill="#d8b4fe" text-anchor="middle">Streamlit UI (:8501)</text>
    </g>

    <!-- Linha E -> F (Query) -->
    <path d="M 160 45 L 240 45" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-active)" />
    <text x="200" y="38" font-size="9" fill="#60a5fa" text-anchor="middle">Pergunta</text>

    <!-- Node F: API FastAPI -->
    <g transform="translate(240, 20)">
      <rect width="120" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
      <text x="60" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">FastAPI</text>
      <text x="60" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">Endpoint /query</text>
    </g>

    <!-- Linha F -> G (Query Vector) -->
    <path d="M 360 45 L 440 45" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Node G: Query Vectorization -->
    <g transform="translate(440, 20)">
      <rect width="140" height="50" rx="6" fill="url(#retrieval-grad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
      <text x="70" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">Query Vector</text>
      <text x="70" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">nomic-embed-text</text>
    </g>

    <!-- Linha G -> ChromaDB (Busca) -->
    <path d="M 510 20 L 510 -20" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
    <text x="520" y="5" font-size="9" fill="#94a3b8">Cosine Similarity (k=3)</text>
  </g>

  <!-- ========================================== -->
  <!-- CAMADA 4: GERAÇÃO (LLM) -->
  <!-- ========================================== -->
  <g transform="translate(40, 420)">
    <text x="10" y="0" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1.5">GERAÇÃO E RESPOSTA</text>

    <!-- Linha ChromaDB -> Prompt (Contexto Recuperado) -->
    <path d="M 490 -150 L 490 -40 L 300 -40 L 300 15" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
    <text x="310" y="-30" font-size="9" fill="#10b981">Contexto Injetado (Top-k Chunks)</text>

    <!-- Linha User -> Prompt (Pergunta Original) -->
    <path d="M 90 -95 L 90 45 L 240 45" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-active)" />
    <text x="160" y="38" font-size="9" fill="#60a5fa">Pergunta Original</text>

    <!-- Node H: Prompt Template -->
    <g transform="translate(240, 20)">
      <rect width="120" height="50" rx="6" fill="url(#generation-grad)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)" />
      <text x="60" y="24" font-size="12" font-weight="600" fill="#f8fafc" text-anchor="middle">PromptTemplate</text>
      <text x="60" y="40" font-size="9" fill="#94a3b8" text-anchor="middle">Context + Question</text>
    </g>

    <!-- Linha H -> I (LLM) -->
    <path d="M 300 70 L 300 110" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

    <!-- Node I: ChatOllama -->
    <g transform="translate(200, 110)">
      <rect width="200" height="60" rx="8" fill="url(#generation-grad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)" />
      <text x="100" y="28" font-size="14" font-weight="700" fill="#f8fafc" text-anchor="middle">🦙 ChatOllama</text>
      <text x="100" y="48" font-size="10" fill="#fcd34d" text-anchor="middle">LLM Local (ex: qwen3 / deepseek)</text>
    </g>

    <!-- Linha I -> J (Resposta) -->
    <path d="M 200 140 L 90 140 L 90 -95" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" />
    <text x="140" y="130" font-size="10" font-weight="600" fill="#10b981">Resposta Fundamentada</text>
  </g>

  <!-- ========================================== -->
  <!-- CAIXA DE MÉTRICAS -->
  <!-- ========================================== -->
  <g transform="translate(150, 710)">
    <rect width="380" height="60" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    <text x="190" y="20" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">MÉTRICAS DO SISTEMA (PRJ-01)</text>
    
    <text x="50" y="45" font-size="12" font-weight="700" fill="#f8fafc">9</text>
    <text x="65" y="45" font-size="9" fill="#94a3b8">Arquivos</text>

    <text x="130" y="45" font-size="12" font-weight="700" fill="#f8fafc">698</text>
    <text x="155" y="45" font-size="9" fill="#94a3b8">Linhas</text>

    <text x="220" y="45" font-size="12" font-weight="700" fill="#10b981">R$ 0,00</text>
    <text x="260" y="45" font-size="9" fill="#94a3b8">Custo API</text>

    <text x="320" y="45" font-size="12" font-weight="700" fill="#3b82f6">100%</text>
    <text x="350" y="45" font-size="9" fill="#94a3b8">Local</text>
  </g>

  <text x="340" y="800" font-size="9" fill="#64748b" text-anchor="middle">GIULIA AI Engineering Ecosystem · Architecture Generated by Antigravity · 2026</text>

</svg>
